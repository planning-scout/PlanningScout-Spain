name: Daily Urbanismo Scanner
on:
  schedule:
    - cron: '0 9 * * 1-5' # Runs every weekday at 9:00 AM
  workflow_dispatch: # Allows manual run

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests pdfplumber beautifulsoup4 urllib3

      - name: Run Crawler
        run: python crawler_bop.py

      - name: Scan Found Links
        run: |
          # Read the JSON and loop through links
          python -c "
          import json, os
          with open('found_links.json') as f:
              links = json.load(f)
          for link in links:
              print(f'\n--- SCANNING: {link} ---')
              os.environ['TARGET_URL'] = link
              os.system('python test_bop.py')
          "
