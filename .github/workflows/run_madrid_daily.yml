name: ConstructorScout — Madrid Daily Scrape

on:
  schedule:
    - cron: '0 7 * * 1-5'  # Monday-Friday at 7am UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Madrid scraper
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          GMAIL_FROM:               ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO_DEMO_MADRID:     ${{ secrets.GMAIL_TO_DEMO_MADRID }}
        run: |
          python core/engine.py --client clients/demo_madrid.json
